    <style>

        /* Адаптация для мобильных */

        /* Стили для привязки */

        .btn-snap {

        .btn-snap.active {

        .snap-option.active {

        }

        @media (max-width: 600px) {
            .snap-menu {
                right: auto;
                left: 0;

        }
    </style>
</head>

<body>
    <div class="card">
        <h1>
            ⚙️ Фреза линейка
            <span>подача мм/сек · мм/мин · дюймы</span>
        </h1>

        <div class="control-panel">
            <div class="speed-box">
                <label>⚡ скорость</label>
                <input type="number" id="speedInput" value="30" min="0.1" max="2000" step="0.1">
            </div>
            <div class="unit-selector" id="speedUnitGroup">
                <button id="unitMmSec" class="unit-btn active-speed">мм/сек</button>
                <button id="unitMmMin" class="unit-btn">мм/мин</button>
                <button id="unitInch" class="unit-btn">дюймы/мин</button>
            </div>
        </div>

        <div class="ruler-container">
            <div class="ruler-header">
                <span>0 мм / 0"</span>
                <span>200 мм / 7.87"</span>
            </div>
            <div class="canvas-wrapper" id="canvasWrapper">
                <canvas id="rulerCanvas" width="800" height="180"></canvas>
            </div>

            <div class="info-bar">
                <div class="readouts-group">
                    <div class="readout" id="posDisplay">📍 0.00 мм</div>
                    <div class="readout inch-readout" id="inchDisplay">📏 0.000"</div>
                    <div class="readout time-readout" id="timeDisplay">⏱️ 0.000 с</div>
                </div>
                <div class="controls-group">
                    <button class="btn-playpause" id="playPauseBtn">⏸️ Пауза</button>
                    <button class="btn-reset" id="resetPointBtn">⟲ сброс</button>
                    <div class="jog-group">
                        <button class="btn-jog" id="jogLeftBtn" title="Короткое нажатие: -0.01 мм / -0.0004" ,
                            длительное: плавное ускорение влево">◀ 0.01мм</button>
                        <button class="btn-jog" id="jogRightBtn" title="Короткое нажатие: +0.01 мм / +0.0004" ,
                            длительное: плавное ускорение вправо">0.01мм ▶</button>
                        <div class="snap-group">
                            <button class="btn-snap" id="snapToggle" title="Режим привязки">🔓 Snap</button>
                            <div class="snap-menu" id="snapMenu" style="display: none;">
                                <button class="snap-option active" data-snap="0">Свободно</button>
                                <button class="snap-option" data-snap="1">1 мм</button>
                                <button class="snap-option" data-snap="5">5 мм</button>
                                <button class="snap-option" data-snap="10">10 мм</button>
                                <button class="snap-option" data-snap="inch1">1"</button>
                                <button class="snap-option" data-snap="inch2">1/2"</button>
                                <button class="snap-option" data-snap="inch4">1/4"</button>
                                <button class="snap-option" data-snap="inch8">1/8"</button>
                                <button class="snap-option" data-snap="inch16">1/16"</button>
                                <button class="snap-option" data-snap="inch32">1/32"</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="jog-tip">
                <span>⚡ Короткое нажатие: шаг 0.01 мм</span>
                <span>⏱️ Длительное нажатие: плавное ускорение</span>
            </div>
            <div class="legend">
                <span>Точка фрезы · скорость <span id="currentSpeedValue">30</span> <span
                        id="currentUnitLabel">мм/сек</span></span>
            </div>
        </div>
        <footer>фреза линейка · визуализация скорости подачи для ЧПУ</footer>
    </div>

    <script>
        (function () {
            const MM_LENGTH = 200;
            const PX_PER_MM = 3.2;
            const START_OFFSET = 40;

            // Настройки для перемотки
            const JOG_STEP_SHORT = 0.01; // шаг при коротком нажатии (0.01 мм)
            const JOG_LONG_PRESS_DELAY = 400; // мс - через сколько считать нажатие длительным
            const JOG_MAX_SPEED = 1; // максимальная скорость плавной перемотки (мм/сек)
            const JOG_ACCELERATION = 0.5; // ускорение (мм/сек²)

            // Константы для пересчета единиц
            const INCH_TO_MM = 25.4; // 1 дюйм = 25.4 мм

            // Дюймовые дроби для подписей
            const INCH_FRACTIONS = [
                { mm: 0, fraction: "0", decimal: 0 },
                { mm: 3.175, fraction: "1/8", decimal: 0.125 },
                { mm: 6.35, fraction: "1/4", decimal: 0.25 },
                { mm: 9.525, fraction: "3/8", decimal: 0.375 },
                { mm: 12.7, fraction: "1/2", decimal: 0.5 },
                { mm: 15.875, fraction: "5/8", decimal: 0.625 },
                { mm: 19.05, fraction: "3/4", decimal: 0.75 },
                { mm: 22.225, fraction: "7/8", decimal: 0.875 },
                { mm: 25.4, fraction: "1", decimal: 1 },
                { mm: 38.1, fraction: "1½", decimal: 1.5 },
                { mm: 50.8, fraction: "2", decimal: 2 },
                { mm: 63.5, fraction: "2½", decimal: 2.5 },
                { mm: 76.2, fraction: "3", decimal: 3 },
                { mm: 88.9, fraction: "3½", decimal: 3.5 },
                { mm: 101.6, fraction: "4", decimal: 4 },
                { mm: 114.3, fraction: "4½", decimal: 4.5 },
                { mm: 127, fraction: "5", decimal: 5 },
                { mm: 139.7, fraction: "5½", decimal: 5.5 },
                { mm: 152.4, fraction: "6", decimal: 6 },
                { mm: 165.1, fraction: "6½", decimal: 6.5 },
                { mm: 177.8, fraction: "7", decimal: 7 },
                { mm: 190.5, fraction: "7½", decimal: 7.5 },
                { mm: 203.2, fraction: "8", decimal: 8 }
            ];

            const canvas = document.getElementById('rulerCanvas');
            const ctx = canvas.getContext('2d');
            const wrapper = document.getElementById('canvasWrapper');

            const speedInput = document.getElementById('speedInput');
            const unitMmSec = document.getElementById('unitMmSec');
            const unitMmMin = document.getElementById('unitMmMin');
            const unitInch = document.getElementById('unitInch');
            const posDisplay = document.getElementById('posDisplay');
            const inchDisplay = document.getElementById('inchDisplay');
            const timeDisplay = document.getElementById('timeDisplay');
            const currentSpeedSpan = document.getElementById('currentSpeedValue');
            const currentUnitLabel = document.getElementById('currentUnitLabel');

            const resetBtn = document.getElementById('resetPointBtn');
            const playPauseBtn = document.getElementById('playPauseBtn');
            const jogLeftBtn = document.getElementById('jogLeftBtn');
            const jogRightBtn = document.getElementById('jogRightBtn');

            let speedUnit = 'sec'; // 'sec', 'min', 'inch'
            let pointPosMm = 0;
            let elapsedTimeSec = 0;
            let lastTimestamp = null;
            let animFrame = null;
            let isRunning = true;

            // Переменные для обработки длительных нажатий
            let pressTimer = null;
            let isLongPress = false;
            let activeJogDirection = null; // 'left' или 'right'
            let jogSpeed = 0; // текущая скорость перемотки
            let lastJogTime = null;
            // Переменные для перетаскивания
            let isDragging = false;
            let dragStartX = 0;
            let dragStartPos = 0;

            // Переменные для привязки
            let snapMode = 0; // 0 - свободно, 1 - 1мм, 5 - 5мм, 10 - 10мм, 'inch8' - 1/8", 'inch16' - 1/16"
            let snapMenuVisible = false;

            // Функция привязки к сетке
            function snapToGrid(value, mode) {
                if (mode === 0) return value;

                if (mode === 1) {
                    return Math.round(value * 100) / 100;
                } else if (mode === 5) {
                    return Math.round(value / 5) * 5;
                } else if (mode === 10) {
                    return Math.round(value / 10) * 10;
                } else if (mode === 'inch1') {
                    // 1 дюйм = 25.4 мм
                    return Math.round(value / 25.4) * 25.4;
                } else if (mode === 'inch2') {
                    // 1/2 дюйма = 12.7 мм
                    return Math.round(value / 12.7) * 12.7;
                } else if (mode === 'inch4') {
                    // 1/4 дюйма = 6.35 мм
                    return Math.round(value / 6.35) * 6.35;
                } else if (mode === 'inch8') {
                    // 1/8 дюйма = 3.175 мм
                    return Math.round(value / 3.175) * 3.175;
                } else if (mode === 'inch16') {
                    // 1/16 дюйма = 1.5875 мм
                    return Math.round(value / 1.5875) * 1.5875;
                } else if (mode === 'inch32') {
                    // 1/32 дюйма = 0.79375 мм
                    return Math.round(value / 0.79375) * 0.79375;
                }
                return value;
            }

            // Функция для применения привязки
            function applySnap() {
                if (snapMode !== 0) {
                    pointPosMm = snapToGrid(pointPosMm, snapMode);
                    redrawCanvas();
                    updateLabel();
                }
            }

            // Обработчики для меню привязки
            document.getElementById('snapToggle').addEventListener('click', () => {
                snapMenuVisible = !snapMenuVisible;
                document.getElementById('snapMenu').style.display = snapMenuVisible ? 'block' : 'none';
            });

            document.querySelectorAll('.snap-option').forEach(option => {
                option.addEventListener('click', (e) => {
                    // Убираем активный класс у всех
                    document.querySelectorAll('.snap-option').forEach(opt => {
                        opt.classList.remove('active');
                    });

                    // Добавляем активный класс выбранному
                    option.classList.add('active');

                    // Устанавливаем режим
                    snapMode = option.dataset.snap === '0' ? 0 :
                        (option.dataset.snap === '1' ? 1 :
                            (option.dataset.snap === '5' ? 5 :
                                (option.dataset.snap === '10' ? 10 : option.dataset.snap)));

                    // Обновляем кнопку
                    let snapBtn = document.getElementById('snapToggle');
                    if (snapMode === 0) {
                        snapBtn.innerHTML = '🔓 Snap';
                        snapBtn.classList.remove('active');
                    } else {
                        snapBtn.innerHTML = `🔒 ${option.textContent}`;
                        snapBtn.classList.add('active');
                    }

                    // Применяем привязку к текущей позиции
                    applySnap();

                    // Закрываем меню
                    snapMenuVisible = false;
                    document.getElementById('snapMenu').style.display = 'none';
                });
            });

            // Закрытие меню при клике вне его
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.snap-group')) {
                    snapMenuVisible = false;
                    document.getElementById('snapMenu').style.display = 'none';
                }
            });

            // Функции для обработки перетаскивания
            function startDrag(e) {
                if (isRunning) return; // только на паузе

                e.preventDefault();
                isDragging = true;
                canvas.classList.add('dragging');

                // Получаем координаты касания/клика
                const clientX = e.type.startsWith('touch') ? e.touches[0].clientX : e.clientX;

                // Получаем позицию canvas
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width; // учитываем масштабирование

                // Вычисляем позицию в пикселях canvas
                const canvasX = (clientX - rect.left) * scaleX;
                dragStartX = canvasX;
                dragStartPos = pointPosMm;

                // Отключаем анимацию на время перетаскивания
                if (animFrame) {
                    cancelAnimationFrame(animFrame);
                    animFrame = null;
                }
            }

            function onDrag(e) {
                if (!isDragging || isRunning) return;

                e.preventDefault();

                // Получаем координаты касания/клика
                const clientX = e.type.startsWith('touch') ? e.touches[0].clientX : e.clientX;

                // Получаем позицию canvas
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;

                // Вычисляем текущую позицию в пикселях canvas
                const canvasX = (clientX - rect.left) * scaleX;

                // Вычисляем смещение в пикселях
                const deltaPx = canvasX - dragStartX;

                // Переводим в миллиметры
                const deltaMm = deltaPx / PX_PER_MM;

                // Новая позиция с ограничениями
                let newPos = dragStartPos + deltaMm;
                newPos = Math.max(0, Math.min(MM_LENGTH, newPos));

                // Обновляем позицию
                pointPosMm = newPos;
                applySnap()
                // Перерисовываем
                redrawCanvas();
                updateLabel();
            }

            function endDrag(e) {
                if (!isDragging) return;

                e.preventDefault();
                isDragging = false;
                canvas.classList.remove('dragging');

                // Возобновляем анимацию, если она была запущена
                if (isRunning && !animFrame) {
                    animFrame = requestAnimationFrame(animation);
                }
            }
            // Функция для форматирования дюймов в дроби
            function formatInchFraction(inches) {
                let whole = Math.floor(inches);
                let fraction = inches - whole;

                // Находим ближайшую стандартную дробь
                const fractions = [
                    { decimal: 0.0625, text: "1/16" },
                    { decimal: 0.125, text: "1/8" },
                    { decimal: 0.1875, text: "3/16" },
                    { decimal: 0.25, text: "1/4" },
                    { decimal: 0.3125, text: "5/16" },
                    { decimal: 0.375, text: "3/8" },
                    { decimal: 0.4375, text: "7/16" },
                    { decimal: 0.5, text: "1/2" },
                    { decimal: 0.5625, text: "9/16" },
                    { decimal: 0.625, text: "5/8" },
                    { decimal: 0.6875, text: "11/16" },
                    { decimal: 0.75, text: "3/4" },
                    { decimal: 0.8125, text: "13/16" },
                    { decimal: 0.875, text: "7/8" },
                    { decimal: 0.9375, text: "15/16" }
                ];

                if (fraction < 0.001) {
                    return whole + '"';
                }

                let bestMatch = fractions.reduce((prev, curr) => {
                    return (Math.abs(curr.decimal - fraction) < Math.abs(prev.decimal - fraction) ? curr : prev);
                });

                if (whole === 0) {
                    return bestMatch.text + '"';
                } else {
                    return whole + bestMatch.text + '"';
                }
            }

            function setCanvasSize() {
                const contentWidth = MM_LENGTH * PX_PER_MM;
                const totalWidth = Math.max(750, contentWidth + 90);
                canvas.width = totalWidth;
                canvas.height = 180;
            }

            function drawRuler() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                const startX = START_OFFSET;
                const endX = startX + MM_LENGTH * PX_PER_MM;
                const yLine = 110;

                // Рисуем основную линию линейки
                ctx.beginPath();
                ctx.lineWidth = 8;
                ctx.strokeStyle = '#1f4172';
                ctx.moveTo(startX, yLine);
                ctx.lineTo(endX, yLine);
                ctx.stroke();

                // Рисуем зубчатую канавку 
                ctx.beginPath();
                ctx.strokeStyle = '#8ba3c2';
                ctx.lineWidth = 1.5;
                for (let mm = 0; mm <= MM_LENGTH; mm += 0.5) {
                    let x = startX + mm * PX_PER_MM;
                    if (mm % 1 === 0) {
                        // Основные зубцы
                        ctx.beginPath();
                        ctx.moveTo(x, yLine - 4);
                        ctx.lineTo(x, yLine - 12);
                        ctx.strokeStyle = '#5279a3';
                        ctx.stroke();
                    } else {
                        // Мелкие зубцы
                        ctx.beginPath();
                        ctx.moveTo(x, yLine - 2);
                        ctx.lineTo(x, yLine - 6);
                        ctx.strokeStyle = '#8ba3c2';
                        ctx.stroke();
                    }
                }

                // Рисуем миллиметровую градуировку
                for (let mm = 0; mm <= MM_LENGTH; mm++) {
                    let x = startX + mm * PX_PER_MM;
                    if (x < startX || x > endX) continue;

                    let height;
                    let lineW;
                    let isMajor = false;

                    // Определяем тип деления
                    if (mm % 10 === 0) {
                        height = 38;
                        lineW = 2.5;
                        isMajor = true;
                    } else if (mm % 5 === 0) {
                        height = 28;
                        lineW = 2.0;
                    } else {
                        height = 14;
                        lineW = 1.0;
                    }

                    // Рисуем штрих
                    ctx.beginPath();
                    ctx.moveTo(x, yLine - height);
                    ctx.lineTo(x, yLine - 2);

                    ctx.strokeStyle = '#1f4172';
                    ctx.lineWidth = lineW;
                    ctx.stroke();

                    // Подписи мм
                    if (isMajor) {
                        ctx.fillStyle = '#0a2e50';
                        ctx.font = 'bold 14px "Segoe UI", monospace';
                        ctx.fillText(mm, x, yLine - 45);
                    }
                }

                // Добавляем подпись "мм"
                ctx.fillStyle = '#1f4172';
                ctx.font = 'bold 12px "Segoe UI", monospace';
                ctx.fillText('мм', startX - 25, yLine - 25);

                // Рисуем дюймовые дроби под линейкой
                ctx.fillStyle = '#8ba3c2';
                ctx.font = 'bold 11px "Segoe UI", monospace';
                ctx.textAlign = 'center';

                for (let i = 0; i < INCH_FRACTIONS.length; i++) {
                    let inch = INCH_FRACTIONS[i];
                    let x = startX + inch.mm * PX_PER_MM;
                    if (x >= startX && x <= endX) {
                        // Для целых дюймов делаем более жирную подпись
                        if (inch.fraction.includes('½') || inch.fraction === '0' || inch.fraction === '1' || inch.fraction === '2' || inch.fraction === '3' || inch.fraction === '4' || inch.fraction === '5' || inch.fraction === '6' || inch.fraction === '7' || inch.fraction === '8') {
                            ctx.font = 'bold 12px "Segoe UI", monospace';
                            ctx.fillStyle = '#5279a3';
                        } else {
                            ctx.font = '10px "Segoe UI", monospace';
                            ctx.fillStyle = '#8ba3c2';
                        }
                        ctx.fillText(inch.fraction + '"', x, yLine + 25);
                    }
                }
            }

            function drawPoint() {
                const startX = START_OFFSET;
                const x = startX + pointPosMm * PX_PER_MM;
                const y = 90;
                const pointRadius = 6;

                ctx.beginPath();
                ctx.arc(x, y, pointRadius, 0, 2 * Math.PI);
                ctx.fillStyle = '#cf1f4e';
                ctx.shadowColor = '#9e1040';
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2.5;
                ctx.stroke();

                // Блик
                ctx.beginPath();
                ctx.arc(x - 2, y - 2, 2, 0, 2 * Math.PI);
                ctx.fillStyle = '#ff9eb5';
                ctx.fill();
            }

            function redrawCanvas() {
                drawRuler();
                drawPoint();
            }

            function getSpeedInMmPerSec() {
                let speedVal = parseFloat(speedInput.value) || 0;
                if (speedVal < 0) speedVal = 0;

                if (speedUnit === 'sec') {
                    return speedVal;
                } else if (speedUnit === 'min') {
                    return speedVal / 60.0;
                } else if (speedUnit === 'inch') {
                    return (speedVal * INCH_TO_MM) / 60.0;
                }
                return 0;
            }

            // Добавьте переменные для хранения предыдущих значений
            let lastPosValue = -1;
            let lastInchValue = -1;
            let lastTimeValue = -1;

            // В функции updateLabel() замените на это
            function updateLabel() {
                // Показываем позицию в мм
                let posText = `📍 ${pointPosMm.toFixed(2)} мм`;
                if (posDisplay.innerText !== posText) {
                    posDisplay.innerText = posText;
                }

                // Показываем дюймы
                let inches = pointPosMm / INCH_TO_MM;
                let inchFraction = formatInchFraction(inches);
                let inchText = `📏 ${inchFraction}`;
                if (inchDisplay.innerText !== inchText) {
                    inchDisplay.innerText = inchText;
                }

                // Время с миллисекундами
                let timeText = `⏱️ ${elapsedTimeSec.toFixed(3)} с`;
                if (timeDisplay.innerText !== timeText) {
                    timeDisplay.innerText = timeText;
                }

                // Скорость (меняется редко)
                let speedText = speedInput.value;
                if (currentSpeedSpan.innerText !== speedText) {
                    currentSpeedSpan.innerText = speedText;
                }

                // Обновляем метку единиц скорости
                let unitText = '';
                if (speedUnit === 'sec') unitText = 'мм/сек';
                else if (speedUnit === 'min') unitText = 'мм/мин';
                else if (speedUnit === 'inch') unitText = 'дюймы/мин';

                if (currentUnitLabel.innerText !== unitText) {
                    currentUnitLabel.innerText = unitText;
                }

                // Обновляем состояние кнопок перемотки
                jogLeftBtn.disabled = isRunning;
                jogRightBtn.disabled = isRunning;

                // Обновляем title страницы для поисковиков
                document.title = `Фреза линейка — ${speedInput.value} ${unitText} | визуализация ЧПУ`;
            }

            function resetPoint() {
                pointPosMm = 0;
                elapsedTimeSec = 0;
                lastTimestamp = null;
                redrawCanvas();
                updateLabel();
            }

            function togglePlayPause() {
                isRunning = !isRunning;
                if (isRunning) {
                    playPauseBtn.innerHTML = '⏸️ Пауза';
                    playPauseBtn.classList.remove('paused');
                    lastTimestamp = null;
                    animFrame = requestAnimationFrame(animation);
                } else {
                    playPauseBtn.innerHTML = '▶️ Пуск';
                    playPauseBtn.classList.add('paused');
                    if (animFrame) {
                        cancelAnimationFrame(animFrame);
                        animFrame = null;
                    }
                }
                updateLabel();
            }

            function jogShort(direction) {
                if (isRunning) return;

                if (direction === 'left') {
                    pointPosMm = Math.max(0, pointPosMm - JOG_STEP_SHORT);
                } else {
                    pointPosMm = Math.min(MM_LENGTH, pointPosMm + JOG_STEP_SHORT);
                }

                applySnap();

                redrawCanvas();
                updateLabel();
            }

            function startJog(direction) {
                if (isRunning) return;

                if (pressTimer) {
                    clearTimeout(pressTimer);
                }

                isLongPress = false;
                activeJogDirection = direction;
                jogSpeed = 5;
                lastJogTime = performance.now();

                pressTimer = setTimeout(() => {
                    isLongPress = true;
                    jogLeftBtn.classList.add('jog-fast');
                    jogRightBtn.classList.add('jog-fast');
                    if (!animFrame) {
                        animFrame = requestAnimationFrame(jogAnimation);
                    }
                }, JOG_LONG_PRESS_DELAY);
            }

            function endJog() {
                if (pressTimer) {
                    clearTimeout(pressTimer);
                    pressTimer = null;
                }

                if (!isLongPress && activeJogDirection) {
                    jogShort(activeJogDirection);
                }

                isLongPress = false;
                activeJogDirection = null;
                jogSpeed = 0;
                jogLeftBtn.classList.remove('jog-fast');
                jogRightBtn.classList.remove('jog-fast');
            }

            function jogAnimation(now) {
                if (!isLongPress || !activeJogDirection || isRunning) {
                    if (animFrame) {
                        cancelAnimationFrame(animFrame);
                        animFrame = null;
                    }
                    return;
                }

                if (lastJogTime) {
                    const deltaSec = (now - lastJogTime) / 1000;

                    jogSpeed = Math.min(JOG_MAX_SPEED, jogSpeed + JOG_ACCELERATION * deltaSec);

                    let deltaPos = jogSpeed * deltaSec;

                    if (activeJogDirection === 'left') {
                        pointPosMm = Math.max(0, pointPosMm - deltaPos);
                    } else {
                        pointPosMm = Math.min(MM_LENGTH, pointPosMm + deltaPos);
                    }
                    applySnap();
                    redrawCanvas();
                    updateLabel();
                }

                lastJogTime = now;
                animFrame = requestAnimationFrame(jogAnimation);
            }

            function animation(now) {
                if (!isRunning) return;

                if (lastTimestamp !== null) {
                    const deltaSec = (now - lastTimestamp) / 1000;

                    let speedMmPerSec = getSpeedInMmPerSec();

                    let maxStep = 20.0;
                    let deltaPos = Math.min(speedMmPerSec * deltaSec, maxStep);
                    if (deltaPos > 0.0001) {
                        pointPosMm += deltaPos;
                        elapsedTimeSec += deltaSec;
                    }
                    applySnap();
                    if (pointPosMm >= MM_LENGTH) {
                        pointPosMm = 0.0;
                    }
                }

                lastTimestamp = now;
                redrawCanvas();
                updateLabel();

                animFrame = requestAnimationFrame(animation);
            }
            // Обработчики для кнопок единиц измерения
            unitMmSec.addEventListener('click', () => {
                if (speedUnit === 'sec') return;
                speedUnit = 'sec';
                unitMmSec.classList.add('active-speed');
                unitMmMin.classList.remove('active-speed');
                unitInch.classList.remove('active-speed');
                updateLabel();
            });

            unitMmMin.addEventListener('click', () => {
                if (speedUnit === 'min') return;
                speedUnit = 'min';
                unitMmMin.classList.add('active-speed');
                unitMmSec.classList.remove('active-speed');
                unitInch.classList.remove('active-speed');
                updateLabel();
            });

            unitInch.addEventListener('click', () => {
                if (speedUnit === 'inch') return;
                speedUnit = 'inch';
                unitInch.classList.add('active-speed');
                unitMmSec.classList.remove('active-speed');
                unitMmMin.classList.remove('active-speed');
                updateLabel();
            });

            // Обработчики событий для кнопок перемотки
            jogLeftBtn.addEventListener('mousedown', () => startJog('left'));
            jogLeftBtn.addEventListener('mouseup', endJog);
            jogLeftBtn.addEventListener('mouseleave', endJog);

            jogRightBtn.addEventListener('mousedown', () => startJog('right'));
            jogRightBtn.addEventListener('mouseup', endJog);
            jogRightBtn.addEventListener('mouseleave', endJog);

            // Для touch-устройств
            jogLeftBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                startJog('left');
            });
            jogLeftBtn.addEventListener('touchend', endJog);
            jogLeftBtn.addEventListener('touchcancel', endJog);

            jogRightBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                startJog('right');
            });
            jogRightBtn.addEventListener('touchend', endJog);
            jogRightBtn.addEventListener('touchcancel', endJog);

            speedInput.addEventListener('input', updateLabel);
            resetBtn.addEventListener('click', resetPoint);
            playPauseBtn.addEventListener('click', togglePlayPause);

            // Обработчики для перетаскивания
            canvas.addEventListener('mousedown', startDrag);
            window.addEventListener('mousemove', onDrag);
            window.addEventListener('mouseup', endDrag);

            // Сенсорные события
            canvas.addEventListener('touchstart', startDrag, { passive: false });
            canvas.addEventListener('touchmove', onDrag, { passive: false });
            canvas.addEventListener('touchend', endDrag);
            canvas.addEventListener('touchcancel', endDrag);

            // Предотвращаем выделение текста при перетаскивании
            canvas.addEventListener('dragstart', (e) => e.preventDefault());
            setCanvasSize();
            resetPoint();
            animFrame = requestAnimationFrame(animation);

            window.addEventListener('beforeunload', () => {
                if (animFrame) cancelAnimationFrame(animFrame);
                if (pressTimer) clearTimeout(pressTimer);
            });

            window.addEventListener('resize', () => {
                redrawCanvas();
            });
        })();
    </script>
</body>
